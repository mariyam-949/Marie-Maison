<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product — Marie Maison</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="header"></div>

  <section>
    <div class="container">
      <div id="productDetail"><div class="loading">Loading piece…</div></div>
    </div>
  </section>

  <div id="footer"></div>
  <script src="/js/app.js"></script>
  <script>
    const id = parseInt(new URLSearchParams(location.search).get('id'), 10);
    const wrap = document.getElementById('productDetail');

    if (!id) {
      wrap.innerHTML = '<div class="empty-state"><h3>No product selected.</h3><a href="/shop.html" class="btn" style="margin-top:20px;">Back to Shop</a></div>';
    } else {
      fetch(`/api/products/${id}`)
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(p => {
          document.title = `${p.name} — Marie Maison`;
          wrap.innerHTML = `
            <div class="product-detail">
              <div class="gallery"><img src="${p.image}" alt="${p.name}"/></div>
              <div class="meta">
                <p class="cat">${p.category}</p>
                <h1>${p.name}</h1>
                <p class="price">${formatPrice(p.price)}</p>
                <p class="desc">${p.description}</p>
                <div class="material"><strong>Material:</strong> ${p.material}</div>
                <button class="btn btn-gold" onclick="addToCart(${p.id})">Add to Cart</button>
                <a href="/shop.html" class="btn btn-outline" style="margin-left:12px;">Continue Browsing</a>
                <p class="sku">SKU: ${p.sku}</p>
              </div>
            </div>`;
        })
        .catch(() => {
          wrap.innerHTML = '<div class="empty-state"><h3>Product not found.</h3><a href="/shop.html" class="btn" style="margin-top:20px;">Back to Shop</a></div>';
        });
    }
  </script>
</body>
</html>
