<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Marie Maison</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="header"></div>

  <section>
    <div class="container" style="max-width:680px;">
      <div class="section-head">
        <p class="eyebrow" style="color:var(--gold);letter-spacing:4px;font-size:.7rem;text-transform:uppercase;margin-bottom:12px;">Get in Touch</p>
        <h1>Contact the Maison</h1>
        <p style="color:var(--ink-soft);margin-top:16px;">Our concierge will respond within 24 hours.</p>
      </div>

      <form id="contactForm" class="form-grid cols-2">
        <div class="field"><label>Name</label><input type="text" id="cname" required/></div>
        <div class="field"><label>Email</label><input type="email" id="cemail" required/></div>
        <div class="field" style="grid-column:span 2;"><label>Subject</label><input type="text" id="csubject"/></div>
        <div class="field" style="grid-column:span 2;"><label>Message</label><textarea id="cmessage" required></textarea></div>
        <button type="submit" class="btn btn-gold" style="grid-column:span 2;">Send Message</button>
      </form>

      <div style="margin-top:60px;text-align:center;color:var(--ink-soft);">
        <p><strong style="color:var(--ink);">Marie Maison Boutique</strong></p>
        <p>12 Place Vendôme, 75001 Paris</p>
        <p>+33 1 42 60 00 00 · concierge@mariemaison.fr</p>
      </div>
    </div>
  </section>

  <div id="footer"></div>
  <script src="/js/app.js"></script>
  <script>
  document.getElementById('contactForm').addEventListener('submit', async e => {
    e.preventDefault();

    const body = {
      name:    document.getElementById('cname').value,
      email:   document.getElementById('cemail').value,
      subject: document.getElementById('csubject').value,
      message: document.getElementById('cmessage').value,
    };

    try {
      const res = await fetch('/api/contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      const data = await res.json();      

      if (data.message) {
        toast('Thank you — message received.');
        e.target.reset();
      } else {
        toast(data.error || 'Something went wrong.');
      }
    } catch (err) {
      toast('Failed to send message. Please try again.');
    }
  });
</script>
</body>
</html>
